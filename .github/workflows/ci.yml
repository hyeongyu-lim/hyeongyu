# Verify the site builds on pull requests (no deploy).

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Check and build
        run: corepack pnpm exec npm run build
        env:
          ASTRO_TELEMETRY_DISABLED: "1"
          # Simulate project-site paths when not running on github.com
          GITHUB_REPOSITORY: ${{ github.repository }}
